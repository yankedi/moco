name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2025.3.2
        with:
          pr-mode: false
          results-dir: ${{ runner.temp }}/qodana-results
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1619883240 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
      - name: Upload Qodana logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qodana-logs
          path: ${{ runner.temp }}/qodana-results/
          retention-days: 3
