name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: # Specify your branches here
      - main # The 'main' branch
      - 'releases/*' # The release branches

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}  # to check out the actual pull request commit, not the merge commit
          fetch-depth: 0  # a full history is required for pull request analysis
      - name: Install build dependencies
        run: sudo apt-get install -y cmake libcurl4-openssl-dev
      - name: Generate compile_commands.json
        run: |
          git clone https://github.com/cktan/tomlc17.git /tmp/tomlc17
          git clone https://github.com/DaveGamble/cJSON.git /tmp/cjson
          cmake -S . -B build \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DFETCHCONTENT_SOURCE_DIR_TOMLC17=/tmp/tomlc17 \
            -DFETCHCONTENT_SOURCE_DIR_CJSON=/tmp/cjson
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2025.3
        with:
          pr-mode: false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1619883240 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'