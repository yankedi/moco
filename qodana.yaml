####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
linter: jetbrains/qodana-clang:2026.1-eap
profile:
  name: qodana.recommended
include:
  - name: CheckDependencyLicenses
bootstrap: |
  set -eux
  sudo apt-get update -y
  sudo apt-get install -y cmake libcurl4-openssl-dev libssl-dev
  cmake -S . -B build \
    -DCMAKE_C_COMPILER=clang \
    -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
